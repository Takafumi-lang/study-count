<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>問題集カウントダウン</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --bg-color: #f4f7f6;
        }
        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: var(--bg-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 90%; max-width: 400px; text-align: center; }
        h1 { color: #333; font-size: 1.5rem; margin-bottom: 1.5rem; }
        .hidden { display: none; }
        
        input[type="number"] { width: 80%; padding: 10px; margin: 10px 0; border: 2px solid #ddd; border-radius: 8px; font-size: 1rem; }
        button { background-color: var(--primary-color); color: white; border: none; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-size: 1rem; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        
        .status-display { margin: 20px 0; }
        .remaining-count { font-size: 3rem; font-weight: bold; color: var(--primary-color); }
        .total-info { color: #777; font-size: 0.9rem; }
        .congrats { color: var(--success-color); font-weight: bold; font-size: 1.2rem; animation: bounce 0.5s infinite alternate; }
        
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-5px); } }
    </style>
</head>
<body>

<div class="container">
    <h1>📝 学習進捗トラッカー</h1>

    <div id="setup-section">
        <p>まずは総問題数を設定しましょう</p>
        <input type="number" id="total-input" placeholder="例: 500" min="1">
        <button onclick="initApp()">開始する</button>
    </div>

    <div id="main-section" class="hidden">
        <div class="status-display">
            <div id="remaining-text">残り</div>
            <div class="remaining-count" id="remaining-num">0</div>
            <div class="total-info">全 <span id="display-total">0</span> 問中</div>
        </div>

        <div id="action-area">
            <input type="number" id="progress-input" placeholder="進めた問題数" min="1">
            <button onclick="updateProgress()">更新</button>
        </div>

        <div id="finish-area" class="hidden">
            <p class="congrats">🎉 お疲れ様です！完走しました！</p>
            <button onclick="resetApp()" style="background-color: #666;">新しい問題集を始める</button>
        </div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'study_progress_data';

    // データの読み込み
    let data = JSON.parse(localStorage.getItem(STORAGE_KEY)) || null;

    window.onload = () => {
        if (data) {
            showMain();
        }
    };

    function initApp() {
        const total = parseInt(document.getElementById('total-input').value);
        if (!total || total <= 0) return alert('有効な数字を入力してください');

        data = { total: total, remaining: total };
        saveAndRender();
        showMain();
    }

    function updateProgress() {
        const progress = parseInt(document.getElementById('progress-input').value);
        if (!progress || progress <= 0) return;

        data.remaining = Math.max(0, data.remaining - progress);
        document.getElementById('progress-input').value = ''; // 入力をクリア
        saveAndRender();
    }

    function saveAndRender() {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
        document.getElementById('remaining-num').innerText = data.remaining;
        document.getElementById('display-total').innerText = data.total;

        if (data.remaining <= 0) {
            document.getElementById('action-area').classList.add('hidden');
            document.getElementById('finish-area').classList.remove('hidden');
            document.getElementById('remaining-text').innerText = '完了！';
        }
    }

    function showMain() {
        document.getElementById('setup-section').classList.add('hidden');
        document.getElementById('main-section').classList.remove('hidden');
        saveAndRender();
    }

    function resetApp() {
        if (confirm('データをリセットして新しい問題集を登録しますか？')) {
            localStorage.removeItem(STORAGE_KEY);
            location.reload();
        }
    }
</script>

</body>
</html>
